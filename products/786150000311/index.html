<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beer Leffe Blonde</title>
  <link rel="stylesheet" href="../../assets/style.css">
</head>
<body>

<div class="bg-layer"></div>
<div class="overlay"></div>

<div class="page">

  <!-- LANGUAGES -->
  <div class="topbar">
    <div class="lang active" data-lang="en">EN</div>
    <div class="lang" data-lang="ru">RU</div>
    <div class="lang" data-lang="ua">UA</div>
    <div class="lang" data-lang="de">DE</div>
    <div class="lang" data-lang="es">ES</div>
    <div class="lang" data-lang="it">IT</div>
    <div class="lang" data-lang="hr">HR</div>
    <div class="lang" data-lang="hu">HU</div>
  </div>

  <!-- LOGO -->
  <div class="logo">
    <img src="../../assets/logo.png" alt="Euroland Logo">
  </div>

  <!-- PRODUCT -->
  <div class="product">

    <div class="image-card">
      <img src="../../assets/786150000311.jpg" alt="Leffe Blonde">
    </div>

    <h1 data-i18n="title">BEER LEFFE BLONDE GL</h1>

    <div class="info-card">

      <div class="tags">
        <div class="tag organic">Organic</div>
        <div class="tag kosher">Kosher</div>
      </div>

      <p><strong data-i18n="brand_label">Brand:</strong> <span data-i18n="brand">Leffe</span></p>
      <p><strong data-i18n="country_label">Country:</strong> <span data-i18n="country">Belgium</span></p>
      <p><strong data-i18n="category_label">Category:</strong> <span data-i18n="category">Beer</span></p>
      <p><strong data-i18n="size_label">Size:</strong> 0.35 L</p>
      <p><strong>SKU:</strong> 786150000311</p>

      <br>

      <p><strong data-i18n="description_label">Description:</strong></p>
      <p data-i18n="description"></p>

      <br>

      <p><strong data-i18n="history_label">History:</strong></p>
      <p data-i18n="history"></p>

    </div>
  </div>
</div>

<!-- LANGUAGE SCRIPT -->
<script>
const translations = {
  en: {
    title: "BEER LEFFE BLONDE GL",
    brand_label: "Brand:",
    country_label: "Country:",
    category_label: "Category:",
    size_label: "Size:",
    description_label: "Description:",
    history_label: "History:",
    brand: "Leffe",
    country: "Belgium",
    category: "Beer",
    description:
      "Leffe Blonde is a distinguished Belgian abbey beer with a heritage dating back to 1240. Brewed with carefully selected malts and aromatic hops, it reveals a smooth, balanced profile with refined notes of vanilla, clove, honey, and ripe fruit. Its elegant character and gentle finish make it a perfect choice for both everyday enjoyment and special occasions.",
    history:
      "The story of Leffe begins in the Notre-Dame de Leffe Abbey in Belgium, where monks started brewing beer nearly eight centuries ago. Over generations, they refined their craft, creating beers known for depth, balance, and tradition. Today, Leffe Blonde carries this legacy forward, combining centuries-old abbey brewing heritage with modern expertise to deliver an authentic Belgian classic."
  },

  ru: {
    title: "ПИВО LEFFE BLONDE",
    brand_label: "Бренд:",
    country_label: "Страна:",
    category_label: "Категория:",
    size_label: "Объём:",
    description_label: "Описание:",
    history_label: "История:",
    brand: "Leffe",
    country: "Бельгия",
    category: "Пиво",
    description:
      "Leffe Blonde — это изысканное бельгийское аббатское пиво с историей, уходящей в 1240 год. Оно обладает мягким, сбалансированным вкусом с нотами ванили, гвоздики, медовой сладости и спелых фруктов. Элегантный характер и приятное послевкусие делают его отличным выбором как для повседневного наслаждения, так и для особых случаев.",
    history:
      "История Leffe начинается в аббатстве Нотр-Дам-де-Леффе в Бельгии, где монахи варили пиво ещё в Средние века. На протяжении столетий рецепты и традиции передавались из поколения в поколение. Сегодня Leffe Blonde сохраняет дух аббатского пивоварения, сочетая богатое наследие и современное мастерство."
  }
};

function setLanguage(lang) {
  if (!translations[lang]) return;

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    el.innerText = translations[lang][key] || "";
  });

  document.querySelectorAll(".lang").forEach(l => l.classList.remove("active"));
  document.querySelector(`.lang[data-lang="${lang}"]`)?.classList.add("active");
}

document.querySelectorAll(".lang").forEach(btn => {
  btn.addEventListener("click", () => {
    setLanguage(btn.dataset.lang);
  });
});

// default
setLanguage("en");
</script>


</body>
</html>
